patch:
  schema_list:
    - {schema: double_pinyin_flypy}
    - {schema: luna_pinyin}
    - {schema: luna_pinyin_fluency}
    - {schema: luna_pinyin_simp}
    - {schema: wubi86}
    - {schema: wubi_pinyin}
    #下面的都是新增的配置
  ascii_composer:
      switch_key:
          Caps_Lock: noop
          Shift_L: commit_code
          # Shift_R: inline_ascii
          # Control_L: clear
          Control_R: commit_text
  key_binder/bindings/+: # /+ 表示追加按键绑定.
    - {accept: Escape, toggle: ascii_mode, when: always}
    - {accept: =, send: Page_Down, when: has_menu}
    - {accept: '-', send: Page_Up, when: paging}
    - {accept: Control+period, toggle: ascii_punct, when: always} 
    # 临时切换到中文标点符号(control+. 切换)

  menu:
    page_size: 5  # 候选词个数
    alternative_select_labels: [ ①, ②, ③, ④, ⑤, ⑥, ⑦, ⑧, ⑨, ⑩ ]  # 修改候选项标签
  # 按 Ctrl + . 切换中英文标点（临时切换）
  # 设置 一直都是英文符号
  # punctuator/half_shape: true
